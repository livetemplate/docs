name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# One in-flight deploy at a time; cancel queued runs in favour of the
# newest commit so we never deploy stale code.
concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to fly.io
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to livetemplate.fly.dev
        run: flyctl deploy --config fly.production.toml --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
