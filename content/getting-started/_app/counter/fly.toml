# Tutorial counter for the "Your First App" walkthrough.
# Deployed to lt-firstapp.fly.dev. Embedded in:
#   - /getting-started/your-first-app  (single + side-by-side linked embeds)
#   - /                                (landing page Try-It section)
#   - /recipes/architecture-flow       (post-diagram demo)
#   - /recipes/sync-and-broadcast      (linked-embed broadcast demo)

app = "lt-firstapp"
primary_region = "sjc"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 9090
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  # Keep one machine warm so the first cold-start doesn't eat
  # the docs page's embed-lvt fetch timeout.
  min_machines_running = 1

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
