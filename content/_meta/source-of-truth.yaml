# Machine-readable source-of-truth matrix consumed by the Phase 3 sync
# action. The human-readable companion at source-of-truth.md is the
# canonical reference; this file mirrors it in a format the Go sync
# script can iterate without parsing markdown tables.
#
# Schema:
#   pages:
#     - site_url: <path on docs site>
#       source_repo: <github org/repo>     # full URL form
#       source_path: <path within repo>
#       split_section: <optional anchor>   # for split-from-readme entries
#       transform: <none|extract>          # how to extract content
#
# When source_repo == https://github.com/livetemplate/docs the page is
# native to this repo; the sync action skips it.

pages:
  # NOTE: /getting-started/install is intentionally NOT here — that page is
  # a hybrid (extracted Quick Start + docs-site authored "What next?"
  # additions). It lives natively in the docs repo. See "Hybrid pages —
  # design tension surfaced" in learnings/phase-2.md and the deferred
  # `mirror_mode: extract` schema work for Phase 3.

  # ---- Guides ----
  - site_url: /guides/progressive-complexity
    source_repo: https://github.com/livetemplate/livetemplate
    source_path: docs/guides/progressive-complexity.md
  - site_url: /guides/standard-html-reactivity
    source_repo: https://github.com/livetemplate/livetemplate
    source_path: docs/guides/standard-html-reactivity.md
  - site_url: /guides/ephemeral-components
    source_repo: https://github.com/livetemplate/livetemplate
    source_path: docs/guides/ephemeral-components.md
  - site_url: /guides/observability
    source_repo: https://github.com/livetemplate/livetemplate
    source_path: docs/guides/OBSERVABILITY.md
  - site_url: /guides/scaling
    source_repo: https://github.com/livetemplate/livetemplate
    source_path: docs/guides/SCALING.md

  # ---- Reference ----
  - site_url: /reference/api
    source_repo: https://github.com/livetemplate/livetemplate
    source_path: docs/references/api-reference.md
  - site_url: /reference/client-attributes
    source_repo: https://github.com/livetemplate/livetemplate
    source_path: docs/references/client-attributes.md
  - site_url: /reference/configuration
    source_repo: https://github.com/livetemplate/livetemplate
    source_path: docs/references/CONFIGURATION.md
  - site_url: /reference/session
    source_repo: https://github.com/livetemplate/livetemplate
    source_path: docs/references/session.md
  - site_url: /reference/server-actions
    source_repo: https://github.com/livetemplate/livetemplate
    source_path: docs/references/server-actions.md
  - site_url: /reference/authentication
    source_repo: https://github.com/livetemplate/livetemplate
    source_path: docs/references/authentication.md
  - site_url: /reference/uploads
    source_repo: https://github.com/livetemplate/livetemplate
    source_path: docs/references/uploads.md
  - site_url: /reference/pubsub
    source_repo: https://github.com/livetemplate/livetemplate
    source_path: docs/references/pubsub.md
  - site_url: /reference/error-handling
    source_repo: https://github.com/livetemplate/livetemplate
    source_path: docs/references/error-handling.md
  - site_url: /reference/controller-pattern
    source_repo: https://github.com/livetemplate/livetemplate
    source_path: docs/references/controller-pattern.md
  - site_url: /reference/navigate
    source_repo: https://github.com/livetemplate/livetemplate
    source_path: docs/references/navigate.md
  - site_url: /reference/template-support-matrix
    source_repo: https://github.com/livetemplate/livetemplate
    source_path: docs/references/template-support-matrix.md
  - site_url: /reference/limitations
    source_repo: https://github.com/livetemplate/livetemplate
    source_path: docs/references/current-limitations.md
  - site_url: /reference/progressive-complexity
    source_repo: https://github.com/livetemplate/livetemplate
    source_path: docs/references/progressive-complexity-reference.md

  # ---- CLI (lvt) ----
  - site_url: /cli/
    source_repo: https://github.com/livetemplate/lvt
    source_path: docs/guides/lvt-cli-guide.md
  - site_url: /cli/auth-customization
