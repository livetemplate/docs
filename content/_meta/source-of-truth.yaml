  # ---- TypeScript Client ----
  - site_url: /client/
    source_repo: https://github.com/livetemplate/client
    source_path: README.md

  # App recipes used to be mirrored from livetemplate/examples here.
  # After the consolidation (see examples/<slug>/), the short summary
  # pages at content/recipes/apps/<slug>.md are docs-native; their
  # source-of-truth is this repo. The runnable apps themselves live at
  # docs/examples/<slug>/ and are mounted by cmd/site.

  # ---- Contributing ----
  - site_url: /contributing/livetemplate
    source_repo: https://github.com/livetemplate/livetemplate
    source_path: CONTRIBUTING.md
  - site_url: /contributing/client
