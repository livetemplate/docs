sources:
  # Patterns catalog index: served by the docs-site recipes binary
  # (cmd/site) at the in-process patterns mount. /patterns/index.md
  # binds to this via <div lvt-source="patterns">. tinkerdown's REST
  # source fetcher runs server-side at render/WS-connect time, so the
  # localhost upstream is reachable.
  patterns:
    type: rest
    from: http://localhost:9091/patterns/api/index.json
    result_path: categories
    cache:
      ttl: 5m
  # Phase 5 recipe 6: live LiveTemplate releases from GitHub API.
  # /recipes/live-releases.md binds to this. 1h cache keeps us under
  # GitHub's 60-req/h unauthenticated rate limit.
  releases:
    type: rest
    from: https://api.github.com/repos/livetemplate/livetemplate/releases
    cache:
      ttl: 1h

routes:
  # Pattern category subtrees proxy to the docs-site recipes binary
  # (cmd/site) at the in-process /patterns/ mount, NOT resolved as
  # markdown. Tinkerdown forwards /patterns/<cat>/<slug> verbatim to
  # the upstream so cmd/site sees the same path.
  - pattern: "/patterns/forms/"
    type: "proxy"
    upstream: "http://localhost:9091"
  - pattern: "/patterns/lists/"
    type: "proxy"
    upstream: "http://localhost:9091"
  - pattern: "/patterns/loading/"
    type: "proxy"
    upstream: "http://localhost:9091"
  - pattern: "/patterns/feedback/"
    type: "proxy"
    upstream: "http://localhost:9091"
  - pattern: "/patterns/navigation/"
    type: "proxy"
    upstream: "http://localhost:9091"
  - pattern: "/patterns/realtime/"
    type: "proxy"
    upstream: "http://localhost:9091"
  - pattern: "/patterns/search/"
    type: "proxy"
    upstream: "http://localhost:9091"
  # Recipe apps under /apps/<slug>/ (counter, todos, future folds) are
  # served by cmd/site too. Direct navigation via in-page links (e.g.
  # the Todos recipe's "Launch the live demo" link) bypasses embed-lvt
  # and hits tinkerdown's public port; this route proxies them through.
  # WebSocket upgrade flows for /apps/<slug>/live also use this route.
  - pattern: "/apps/"
    type: "proxy"
    upstream: "http://localhost:9091"

# Landing-page demo iframes lt-landing-demo.fly.dev cross-origin so its
# embedded LiveTemplate client connects to its own host (a same-origin
# proxy can't satisfy that — the client auto-derives the WS URL from
# window.location). The CSP frame-src directive below is the opt-in.
security:
  frame_src:
    - "https://lt-landing-demo.fly.dev"

server:
  port: 8084
  host: "0.0.0.0"
  debug: true

styling:
  theme: "clean"
  primary_color: "#5a67d8"
  font: "system-ui"

blocks:
  auto_id: true
  id_format: "kebab-case"
  show_line_numbers: false

features:
  hot_reload: true
  sidebar: true
  # Mermaid renders client-side in the browser. The previous setting
  # (prerender_diagrams: true) shipped diagram sources to kroki.io at
  # parse time to inline SVGs and skip the ~3.3MB mermaid runtime.
  # Two reasons we no longer use it:
  #
  # - Tinkerdown's "graceful degradation" path doesn't actually time
  #   out when kroki is unreachable; it blocks discovery indefinitely
  #   on http2ClientConn.roundTrip, and the whole site fails to start.
  # - The third-party HTTP roundtrip leaks diagram source content
  #   off-box at every parse, with no on-failure budget.
  #
  # Cost of flipping back: the 5 docs pages that currently use mermaid
  # (landing + 4 recipes) ship the mermaid runtime to readers. That's
  # contained and observable — pages without diagrams are unaffected.
  # Revisit (self-host kroki / build-time pre-render / D2) if mermaid
  # page weight ever becomes a measured concern.
  prerender_diagrams: false
