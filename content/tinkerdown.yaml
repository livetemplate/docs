sources:
  # UI pattern recipe catalog index: served by the docs-site recipes binary
  # (cmd/site) at the in-process patterns mount (now /apps/ui-patterns/).
  # /recipes/ui-patterns/index.md binds to this via <div lvt-source="patterns">.
  # tinkerdown's REST source fetcher runs server-side at render/WS-connect time,
  # so the localhost upstream is reachable.
  patterns:
    type: rest
    from: http://localhost:9091/apps/ui-patterns/api/index.json
    result_path: categories
    cache:
      ttl: 5m
  # Phase 5 recipe 6: live LiveTemplate releases from GitHub API.
  # /recipes/live-releases.md binds to this. 1h cache keeps us under
  # GitHub's 60-req/h unauthenticated rate limit.
  releases:
    type: rest
    from: https://api.github.com/repos/livetemplate/livetemplate/releases
    cache:
      ttl: 1h

routes:
  # Recipe apps under /apps/<slug>/ (counter, todos, the UI pattern live
  # apps at /apps/ui-patterns/<cat>/<slug>, future folds) are served by the
  # docs-site recipes binary (cmd/site), NOT resolved as markdown. Direct
  # navigation via in-page links and embed-lvt's server-side prefetch both
  # hit this route; WebSocket upgrade flows for /apps/<slug>/live use it too.
  # The UI pattern docs pages live at /recipes/ui-patterns/<cat>/<slug> and
  # ARE markdown, so they must NOT be proxied — that's why the live apps moved
  # under /apps/ (no per-category /recipes/ui-patterns/ proxy routes).
  - pattern: "/apps/"
    type: "proxy"
    upstream: "http://localhost:9091"

# Landing-page demo iframes lt-landing-demo.fly.dev cross-origin so its
# embedded LiveTemplate client connects to its own host (a same-origin
# proxy can't satisfy that — the client auto-derives the WS URL from
# window.location). The CSP frame-src directive below is the opt-in.
security:
  frame_src:
    - "https://lt-landing-demo.fly.dev"

server:
  port: 8084
  host: "0.0.0.0"
  debug: false

styling:
  theme: "clean"
  # Emerald signature — matches the landing brand (gradient #047857 → #10b981).
  # Docs stay calm: this single hue drives links + the active nav item; the
  # vibrant gradients/dark code live only in landing.css (layout: landing).
  primary_color: "#047857"
  # Inter matches the landing's display font; @font-face ships in brand.css
  # (site_css) so it loads in the docs shell too, not just on the landing.
  # Requires tinkerdown >= v0.3.7 (styling.site_css); see Dockerfile.
  font: "Inter"
  # Shared brand primitives (self-hosted fonts) — injected on EVERY page.
  site_css: "assets/brand.css?v=1"
  # Bespoke emerald landing styling — injected only on layout: landing pages.
  custom_css: "assets/landing.css?v=15"

blocks:
  auto_id: true
  id_format: "kebab-case"
  show_line_numbers: false

features:
  hot_reload: true
  sidebar: true
  # Mermaid renders client-side in the browser. The previous setting
  # (prerender_diagrams: true) shipped diagram sources to kroki.io at
  # parse time to inline SVGs and skip the ~3.3MB mermaid runtime.
  # Two reasons we no longer use it:
  #
  # - Tinkerdown's "graceful degradation" path doesn't actually time
  #   out when kroki is unreachable; it blocks discovery indefinitely
  #   on http2ClientConn.roundTrip, and the whole site fails to start.
  # - The third-party HTTP roundtrip leaks diagram source content
  #   off-box at every parse, with no on-failure budget.
  #
  # Cost of flipping back: the 5 docs pages that currently use mermaid
  # (landing + 4 recipes) ship the mermaid runtime to readers. That's
  # contained and observable — pages without diagrams are unaffected.
  # Revisit (self-host kroki / build-time pre-render / D2) if mermaid
  # page weight ever becomes a measured concern.
  prerender_diagrams: false
