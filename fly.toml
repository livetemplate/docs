# Phase 1 staging deployment for the LiveTemplate docs site.
# Production target livetemplate.fly.dev arrives in Phase 6.

app = "livetemplate-docs-staging"
primary_region = "sjc"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  # Keep one machine always running so the first chromedp test of a
  # cold session does not eat 10-25s of cold-start latency. Cheap on
  # shared 1cpu/512mb. Set to 0 to save cost in exchange for slower
  # first response.
  min_machines_running = 1

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
